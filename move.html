<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAM Cube — K5 v3 · Three.js</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0c0d14; min-height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            font-family: 'Courier New', monospace;
            overflow: hidden; user-select: none;
            color: rgba(180,180,190,0.5);
        }
        #c { width: 600px; height: 600px; touch-action: none; cursor: default; }
        .hud { display:flex;flex-direction:column;align-items:center;gap:6px;margin-top:12px; }
        .face-label { color:rgba(126,200,227,0.25);font-size:0.7rem;letter-spacing:0.2em; }
        .info-line { color:rgba(180,180,190,0.3);font-size:0.6rem;min-height:1.2em; }
        .hint { color:rgba(180,180,190,0.15);font-size:0.55rem; }
        .nav-dots { display:flex;gap:6px;margin-top:4px; }
        .nav-dot { width:7px;height:7px;border-radius:50%;background:rgba(126,200,227,0.12);transition:all 0.4s; }
        .nav-dot.active { background:rgba(126,200,227,0.6);box-shadow:0 0 7px rgba(126,200,227,0.4); }
        .dbtn { background:transparent;border:1px solid rgba(180,180,190,0.25);color:rgba(180,180,190,0.5);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:0.6rem;font-family:inherit;margin-top:8px; }
        .dbtn:hover { border-color:rgba(180,180,190,0.5);color:rgba(220,220,230,0.8); }
    </style>
</head>
<body>
    <canvas id="c" width="1200" height="1200"></canvas>
    <div class="hud">
        <div class="face-label" id="faceLabel">1 / 6</div>
        <div class="nav-dots" id="navDots"></div>
        <div class="info-line" id="infoLine"></div>
        <div class="hint">← → naviguer · tap bloquer · re-tap ancrer</div>
        <button class="dbtn" id="btnReset">reset</button>
    </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

// ═══ TABLEAUX ═══

const GAP = 1.15;
const TABLEAUX = [
    { name:'T1', sats:[ {x:0, y:GAP, v:5}, {x:0, y:-GAP, v:2} ] },
    { name:'T2', sats:[ {x:-GAP, y:0, v:4}, {x:GAP, y:0, v:1} ] },
    { name:'T3', sats:[ {x:0, y:GAP, v:3}, {x:-GAP, y:-GAP, v:6}, {x:GAP, y:-GAP, v:2} ] },
    { name:'T4', sats:[ {x:-GAP, y:GAP, v:1}, {x:GAP, y:GAP, v:6}, {x:-GAP, y:-GAP, v:4}, {x:GAP, y:-GAP, v:3} ] },
    { name:'T5', sats:[ {x:0, y:GAP, v:3}, {x:0, y:-GAP, v:5}, {x:-GAP, y:0, v:1}, {x:GAP, y:0, v:6} ] },
    { name:'T6', sats:[
        {x:-2*GAP, y:GAP, v:4}, {x:-2*GAP, y:0, v:1},
        {x:-GAP, y:-GAP, v:2}, {x:GAP, y:-GAP, v:6},
        {x:2*GAP, y:GAP, v:5}, {x:2*GAP, y:0, v:3}, {x:2*GAP, y:-GAP, v:1}
    ] },
];
const TOTAL = TABLEAUX.length;

// ═══ CONFIG ═══

const HALF = 0.52;
const CAM_Z = 18; // fixe, tout rentre

// Calculer le centre X + zoom optimal pour un tableau
function camTargetFor(tIdx){
    let cx=0,mxX=0,mxY=0,count=0;
    sats.forEach(s=>{
        if(s.tableau===tIdx&&!s.locked){
            cx+=s.lx;
            mxX=Math.max(mxX,Math.abs(s.lx));mxY=Math.max(mxY,Math.abs(s.ly));
            count++;
        }
    });
    if(count===0) return {x:0,z:CAM_Z};
    cx/=count;
    const w=(mxX+0.5)*1.2, h=mxY+0.5;
    return {x:cx*0.5, z:1.35+Math.max(w,h)*5.85};
}
function camTargetForStatic(tIdx){
    const tab=TABLEAUX[tIdx]; if(!tab)return {x:0,z:CAM_Z};
    let cx=0,mxX=0,mxY=0;
    tab.sats.forEach(s=>{cx+=s.x;mxX=Math.max(mxX,Math.abs(s.x));mxY=Math.max(mxY,Math.abs(s.y));});
    cx/=tab.sats.length;
    const w=(mxX+0.5)*1.2, h=mxY+0.5;
    return {x:cx*0.5, z:1.35+Math.max(w,h)*5.85};
}

let targetCamX=0;
function refreshZoom(){
    const t=camTargetFor(mod(currentIdx));
    targetCamX=t.x;targetCamZ=t.z;
}

const FACE_ROT=[0, Math.PI/2, Math.PI, -Math.PI/2];

// ═══ THREE SETUP ═══

const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setSize(600,600);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setClearColor(0x0c0d14);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(40,1,0.1,100);
const initCam=camTargetForStatic(0);
camera.position.set(initCam.x,0,initCam.z);camera.lookAt(0,0,0);

scene.add(new THREE.AmbientLight(0xffffff,0.5));
const dl=new THREE.DirectionalLight(0xffffff,0.5);dl.position.set(2,4,5);scene.add(dl);

// ═══ HELPERS ═══

function rrShape(w,h,r){
    const s=new THREE.Shape(),hw=w/2,hh=h/2;
    s.moveTo(-hw+r,-hh);s.lineTo(hw-r,-hh);
    s.quadraticCurveTo(hw,-hh,hw,-hh+r);s.lineTo(hw,hh-r);
    s.quadraticCurveTo(hw,hh,hw-r,hh);s.lineTo(-hw+r,hh);
    s.quadraticCurveTo(-hw,hh,-hw,hh-r);s.lineTo(-hw,-hh+r);
    s.quadraticCurveTo(-hw,-hh,-hw+r,-hh);return s;
}

const _tc={};
function getNumTex(v,c){
    const k=v+'|'+c;if(!_tc[k]){
    const cv=document.createElement('canvas');cv.width=256;cv.height=256;
    const ctx=cv.getContext('2d');ctx.clearRect(0,0,256,256);ctx.fillStyle=c;
    ctx.font='200 115px "Courier New",monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(String(v),128,128);_tc[k]=new THREE.CanvasTexture(cv);}return _tc[k];
}

function placeSat(sat,faceRotY){
    const q=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0),faceRotY);
    sat.mesh.position.copy(new THREE.Vector3(sat.lx,sat.ly,HALF+0.01).applyQuaternion(q));
    sat.mesh.quaternion.copy(q);
}

// ═══ PORTE ═══

let porteValue=3;
const cubeGroup=new THREE.Group();scene.add(cubeGroup);

function makePorteTex(val){
    const c=document.createElement('canvas');c.width=256;c.height=256;const ctx=c.getContext('2d');
    ctx.fillStyle='#0e0f18';const r=30,w=256;
    ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(w-r,0);ctx.quadraticCurveTo(w,0,w,r);
    ctx.lineTo(w,w-r);ctx.quadraticCurveTo(w,w,w-r,w);ctx.lineTo(r,w);ctx.quadraticCurveTo(0,w,0,w-r);
    ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.fill();
    ctx.strokeStyle='rgba(220,220,230,0.5)';ctx.lineWidth=3;ctx.stroke();
    ctx.fillStyle='rgba(220,220,230,0.7)';ctx.font='200 115px "Courier New",monospace';
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(String(val),128,128);
    return new THREE.CanvasTexture(c);
}
const cubeMats=[];for(let i=0;i<6;i++)cubeMats.push(new THREE.MeshBasicMaterial({map:makePorteTex(porteValue)}));
const cubeMesh=new THREE.Mesh(new THREE.BoxGeometry(1,1,1),cubeMats);cubeMesh.userData.isCube=true;cubeGroup.add(cubeMesh);
function updatePorte(val){porteValue=val;const tex=makePorteTex(val);cubeMats.forEach(m=>{m.map=tex;m.needsUpdate=true;});}

// ═══ SATELLITES ═══

const sats=[];
function createSatMesh(value){
    const grp=new THREE.Group(),SZ=1.0,R=0.12,shape=rrShape(SZ,SZ,R);
    grp.add(new THREE.Mesh(new THREE.ShapeGeometry(shape),new THREE.MeshBasicMaterial({color:0x0e0f18,transparent:true,opacity:0.92})));
    const pts=shape.getPoints(48);
    const eLine=new THREE.LineLoop(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:0xdcdce6,transparent:true,opacity:0.2}));
    eLine.position.z=0.002;grp.add(eLine);
    const nMesh=new THREE.Mesh(new THREE.PlaneGeometry(SZ*0.7,SZ*0.7),new THREE.MeshBasicMaterial({map:getNumTex(value,'rgba(180,180,190,0.5)'),transparent:true,depthWrite:false}));
    nMesh.position.z=0.003;grp.add(nMesh);
    const gMesh=new THREE.Mesh(new THREE.ShapeGeometry(rrShape(SZ+0.08,SZ+0.08,R+0.04)),new THREE.MeshBasicMaterial({color:0x06b6d4,transparent:true,opacity:0}));
    gMesh.position.z=-0.005;grp.add(gMesh);
    const hMesh=new THREE.Mesh(new THREE.ShapeGeometry(rrShape(SZ+0.25,SZ+0.25,R+0.1)),new THREE.MeshBasicMaterial({color:0x06b6d4,transparent:true,opacity:0}));
    hMesh.position.z=-0.01;grp.add(hMesh);
    grp.userData={edgeLine:eLine,numMesh:nMesh,glowMesh:gMesh,haloMesh:hMesh,isSat:true};return grp;
}

TABLEAUX.forEach((tab,tIdx)=>{tab.sats.forEach((sd,sIdx)=>{
    const mesh=createSatMesh(sd.v);mesh.visible=false;cubeGroup.add(mesh);
    sats.push({id:tIdx*100+sIdx,value:sd.v,tableau:tIdx,origTableau:tIdx,lx:sd.x,ly:sd.y,origLx:sd.x,origLy:sd.y,locked:false,mesh});
});});

// ═══ STATE ═══

let lockedSat=null,currentIdx=0,busy=false,isAnimating=false,navDir=0;
let targetCamZ=camTargetForStatic(0).z;
const targetQuat=new THREE.Quaternion();
function mod(n){return((n%TOTAL)+TOTAL)%TOTAL;}

// ═══ ASSIGN ═══

function assignFaces(){
    const vis=[mod(currentIdx),mod(currentIdx+1),mod(currentIdx+2),mod(currentIdx-1)];
    sats.forEach(sat=>{
        if(sat.locked)return;
        const fi=vis.indexOf(sat.tableau);
        if(fi>=0){placeSat(sat,FACE_ROT[fi]);if(sat.mesh.parent!==cubeGroup)cubeGroup.attach(sat.mesh);}
    });
}

// ═══ NAV ═══

function navRight(){
    if(busy||isAnimating)return;busy=true;isAnimating=true;navDir=1;
    targetQuat.setFromAxisAngle(new THREE.Vector3(0,1,0),-Math.PI/2);
    const t=camTargetFor(mod(currentIdx+1));targetCamX=t.x;targetCamZ=t.z;
    const show=[mod(currentIdx),mod(currentIdx+1)];
    sats.forEach(s=>{if(!s.locked&&show.includes(s.tableau))s.mesh.visible=true;});
}
function navLeft(){
    if(busy||isAnimating)return;busy=true;isAnimating=true;navDir=-1;
    targetQuat.setFromAxisAngle(new THREE.Vector3(0,1,0),Math.PI/2);
    const t=camTargetFor(mod(currentIdx-1));targetCamX=t.x;targetCamZ=t.z;
    const show=[mod(currentIdx),mod(currentIdx-1)];
    sats.forEach(s=>{if(!s.locked&&show.includes(s.tableau))s.mesh.visible=true;});
}
function onRotationComplete(){
    currentIdx=mod(currentIdx+navDir);cubeGroup.quaternion.identity();targetQuat.identity();navDir=0;
    assignFaces();isAnimating=false;busy=false;updateUI();
}

// ═══ TAP ═══

function tapLock(sat){
    if(busy||isAnimating)return;if(lockedSat)tapRelease(lockedSat);
    sat.locked=true;lockedSat=sat;sat.srcTableau=sat.tableau;sat.srcLx=sat.lx;sat.srcLy=sat.ly;
    scene.attach(sat.mesh);console.log('LOCK',sat.id,'val',sat.value);refreshZoom();updateUI();
}
function tapRelease(sat){
    if(!sat.locked)return;cubeGroup.attach(sat.mesh);
    const lx=sat.mesh.position.x,ly=sat.mesh.position.y,fIdx=mod(currentIdx);
    let closest=null,cd=Infinity;
    for(const o of sats){if(o===sat||o.locked||o.tableau!==fIdx)continue;const d=Math.hypot(o.lx-lx,o.ly-ly);if(d<cd){cd=d;closest=o;}}
    if(closest&&cd<GAP*0.9){
        const cT=closest.tableau,cX=closest.lx,cY=closest.ly;
        sat.tableau=cT;sat.lx=cX;sat.ly=cY;placeSat(sat,FACE_ROT[0]);sat.mesh.scale.set(1,1,1);
        closest.tableau=sat.srcTableau;closest.lx=sat.srcLx;closest.ly=sat.srcLy;placeSat(closest,FACE_ROT[0]);
    } else {sat.tableau=fIdx;sat.lx=lx;sat.ly=ly;placeSat(sat,FACE_ROT[0]);sat.mesh.scale.set(1,1,1);}
    sat.locked=false;lockedSat=null;assignFaces();refreshZoom();updateUI();
}

// ═══ DRAG SWAP (cardinal, animé) ═══

let swapAnim=null; // {sats:[], targets:[], t:0}

function dragSwap(sat, dirX, dirY){
    if(!sat||sat.locked||busy||isAnimating||swapAnim)return false;
    const fIdx=mod(currentIdx);
    if(sat.tableau!==fIdx)return false;

    const tx=sat.lx+dirX*GAP, ty=sat.ly+dirY*GAP;

    // Chercher satellite à la position cible
    const target=sats.find(s=>s!==sat&&!s.locked&&s.tableau===fIdx&&Math.abs(s.lx-tx)<0.1&&Math.abs(s.ly-ty)<0.1);

    if(target){
        // Swap deux satellites — lancer animation
        const aFrom={x:sat.lx,y:sat.ly}, bFrom={x:target.lx,y:target.ly};
        sat.lx=bFrom.x;sat.ly=bFrom.y;target.lx=aFrom.x;target.ly=aFrom.y;
        swapAnim={pairs:[
            {mesh:sat.mesh, from:aFrom, to:bFrom},
            {mesh:target.mesh, from:bFrom, to:aFrom},
        ], t:0};
        console.log('DRAG SWAP',sat.id,'↔',target.id);
        return true;
    }

    // Vérifier si la cible est la porte (0,0)
    if(Math.abs(tx)<0.1&&Math.abs(ty)<0.1){
        const old=porteValue;
        const aFrom={x:sat.lx,y:sat.ly};
        updatePorte(sat.value);
        sat.value=old;
        sat.mesh.userData.numMesh.material.map=getNumTex(old,'rgba(180,180,190,0.5)');
        // Animer le satellite vers le centre puis retour à sa place (visuellement le swap)
        // On ne bouge pas la position logique, juste on anime un aller-retour
        swapAnim={pairs:[
            {mesh:sat.mesh, from:aFrom, to:{x:0,y:0}, bounce:true, finalPos:aFrom},
        ], t:0, isPorte:true};
        console.log('PORTE SWAP val',porteValue,'←→',old);
        return true;
    }

    return false;
}

function tickSwapAnim(dt){
    if(!swapAnim)return;
    swapAnim.t+=dt*4; // vitesse d'animation
    const p=Math.min(1, swapAnim.t);
    const ease=p<0.5?2*p*p:(1-Math.pow(-2*p+2,2)/2); // easeInOutQuad

    if(swapAnim.isPorte){
        // Animation porte : aller vers centre (0→0.5) puis retour (0.5→1)
        const pp=p<0.5?p*2:(2-p*2);
        const ep=pp<0.5?2*pp*pp:(1-Math.pow(-2*pp+2,2)/2);
        swapAnim.pairs.forEach(pair=>{
            const x=pair.from.x+(0-pair.from.x)*ep;
            const y=pair.from.y+(0-pair.from.y)*ep;
            pair.mesh.position.x=x;pair.mesh.position.y=y;
        });
    } else {
        swapAnim.pairs.forEach(pair=>{
            const x=pair.from.x+(pair.to.x-pair.from.x)*ease;
            const y=pair.from.y+(pair.to.y-pair.from.y)*ease;
            pair.mesh.position.x=x;pair.mesh.position.y=y;
        });
    }

    if(p>=1){
        // Finaliser
        swapAnim.pairs.forEach(pair=>{
            if(pair.bounce){
                pair.mesh.position.x=pair.finalPos.x;pair.mesh.position.y=pair.finalPos.y;
            }
        });
        if(!swapAnim.isPorte) assignFaces();
        swapAnim=null;
        refreshZoom();updateUI();
    }
}

// ═══ RAYCAST ═══

const raycaster=new THREE.Raycaster(),mouse=new THREE.Vector2();
function getSatAt(cx,cy){
    const r=canvas.getBoundingClientRect();mouse.x=((cx-r.left)/r.width)*2-1;mouse.y=-((cy-r.top)/r.height)*2+1;
    raycaster.setFromCamera(mouse,camera);const all=[];
    sats.forEach(s=>{if(s.mesh.visible)s.mesh.traverse(c=>{if(c.isMesh)all.push(c);});});
    for(const h of raycaster.intersectObjects(all,false)){let o=h.object;while(o){if(o.userData&&o.userData.isSat){const s=sats.find(x=>x.mesh===o);if(s)return s;}o=o.parent;}}return null;
}

// ═══ POINTER ═══

let pStart=null,pMoved=false,pSat=null;
canvas.addEventListener('pointerdown',e=>{pStart={x:e.clientX,y:e.clientY};pMoved=false;pSat=getSatAt(e.clientX,e.clientY);canvas.setPointerCapture(e.pointerId);});
canvas.addEventListener('pointermove',e=>{if(pStart&&Math.hypot(e.clientX-pStart.x,e.clientY-pStart.y)>10)pMoved=true;});
canvas.addEventListener('pointerup',e=>{
    if(!pStart)return;const dx=e.clientX-pStart.x,dy=e.clientY-pStart.y,dist=Math.hypot(dx,dy);
    if(!pMoved){
        // TAP
        const sat=getSatAt(e.clientX,e.clientY);
        if(sat){if(sat.locked)tapRelease(sat);else tapLock(sat);}
        else if(lockedSat)tapRelease(lockedSat);
    } else if(dist>=15){
        if(pSat&&!pSat.locked){
            // Drag sur un satellite → swap cardinal
            let dirX=0,dirY=0;
            if(Math.abs(dx)>Math.abs(dy)){dirX=dx>0?1:-1;}
            else{dirY=dy>0?-1:1;} // Y inversé (écran vs 3D)
            if(dragSwap(pSat,dirX,dirY)){pStart=null;pSat=null;return;}
        }
        // Pas de swap → navigation
        if(Math.abs(dx)>=Math.abs(dy)){dx>0?navRight():navLeft();}
    }
    pStart=null;pSat=null;
});
canvas.addEventListener('pointercancel',()=>{pStart=null;pSat=null;});

// ═══ WHEEL + KEY ═══

let wx=0,wcd=false,wt=null;
canvas.addEventListener('wheel',e=>{e.preventDefault();if(wcd)return;wx+=e.deltaX+e.deltaY;clearTimeout(wt);wt=setTimeout(()=>{wx=0;},150);if(Math.abs(wx)>30){wx>0?navRight():navLeft();wx=0;wcd=true;setTimeout(()=>{wcd=false;},400);}},{passive:false});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'){navRight();e.preventDefault();}else if(e.key==='ArrowLeft'){navLeft();e.preventDefault();}});

// ═══ UI ═══

const dotsEl=document.getElementById('navDots');
for(let i=0;i<TOTAL;i++){const d=document.createElement('div');d.className='nav-dot'+(i===0?' active':'');dotsEl.appendChild(d);}
function updateUI(){
    const idx=mod(currentIdx);document.getElementById('faceLabel').textContent=`${idx+1} / ${TOTAL}`;
    dotsEl.querySelectorAll('.nav-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
    const c=sats.filter(s=>s.tableau===idx&&!s.locked).length;
    let t=`T${idx+1} [porte:${porteValue}] · ${c} sat${c>1?'s':''}`;if(lockedSat)t+=` · ⟐ ${lockedSat.value} flotte`;
    document.getElementById('infoLine').textContent=t;
}

// ═══ RESET ═══

document.getElementById('btnReset').addEventListener('click',()=>{
    if(lockedSat){cubeGroup.attach(lockedSat.mesh);lockedSat.locked=false;}lockedSat=null;
    let si=0;TABLEAUX.forEach((tab,tIdx)=>{tab.sats.forEach(sd=>{
        const sat=sats[si++];sat.value=sd.v;sat.tableau=tIdx;sat.origTableau=tIdx;
        sat.lx=sd.x;sat.ly=sd.y;sat.origLx=sd.x;sat.origLy=sd.y;sat.locked=false;
        if(sat.mesh.parent!==cubeGroup)cubeGroup.attach(sat.mesh);sat.mesh.scale.set(1,1,1);
        const ud=sat.mesh.userData;ud.glowMesh.material.opacity=0;ud.haloMesh.material.opacity=0;
        ud.edgeLine.material.color.setHex(0xdcdce6);ud.edgeLine.material.opacity=0.2;
        ud.numMesh.material.map=getNumTex(sd.v,'rgba(180,180,190,0.5)');
    });});
    updatePorte(3);cubeGroup.quaternion.identity();targetQuat.identity();
    currentIdx=0;isAnimating=false;busy=false;navDir=0;
    refreshZoom();camera.position.set(targetCamX,0,targetCamZ);assignFaces();updateUI();
});

// ═══ RENDER ═══

const clock=new THREE.Clock();
let lastTime=0;
function animate(){
    requestAnimationFrame(animate);const t=clock.getElapsedTime();const dt=t-lastTime;lastTime=t;
    if(isAnimating){cubeGroup.quaternion.slerp(targetQuat,0.12);
        if(1-Math.abs(cubeGroup.quaternion.dot(targetQuat))<0.0001){cubeGroup.quaternion.copy(targetQuat);onRotationComplete();}}
    tickSwapAnim(dt);
    camera.position.x+=(targetCamX-camera.position.x)*0.1;
    camera.position.z+=(targetCamZ-camera.position.z)*0.1;
    camera.lookAt(camera.position.x*0.8, 0, 0);
    const fIdx=mod(currentIdx);
    sats.forEach(sat=>{const ud=sat.mesh.userData;
        if(sat.locked){sat.mesh.visible=true;const p=0.5+0.5*Math.sin(t*3.5);
            ud.glowMesh.material.opacity=0.3+p*0.4;ud.haloMesh.material.opacity=0.08+p*0.12;
            ud.edgeLine.material.color.setHex(0x06b6d4);ud.edgeLine.material.opacity=0.7+p*0.3;
            ud.numMesh.material.map=getNumTex(sat.value,'rgba(34,211,238,0.95)');
        } else {
            if(!isAnimating)sat.mesh.visible=(sat.tableau===fIdx);
            ud.glowMesh.material.opacity=0;ud.haloMesh.material.opacity=0;
            const foreign=sat.tableau!==sat.origTableau;
            ud.edgeLine.material.color.setHex(foreign?0xffd700:0xdcdce6);
            ud.edgeLine.material.opacity=foreign?0.35:0.2;
            ud.numMesh.material.map=getNumTex(sat.value,foreign?'rgba(255,215,0,0.6)':'rgba(180,180,190,0.5)');
        }
    });
    renderer.render(scene,camera);
}
assignFaces();updateUI();animate();
</script>
