<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

// ═══ ICÔNES — dessin Canvas2D direct ═══
// Chaque fonction dessine dans un ctx, centré sur (cx,cy), taille ~sz
// Couleur néon cyan

function drawIcon(ctx, iconIdx, cx, cy, sz, color) {
    ctx.save();
    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineWidth = sz * 0.08;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.shadowColor = color;
    ctx.shadowBlur = sz * 0.25;
    const h = sz * 0.4, w = sz * 0.4;

    switch(iconIdx) {
        case 0: // chevronUp
            ctx.beginPath();
            ctx.moveTo(cx-w, cy+h*0.5); ctx.lineTo(cx, cy-h*0.5); ctx.lineTo(cx+w, cy+h*0.5);
            ctx.stroke(); break;
        case 1: // chevronDown
            ctx.beginPath();
            ctx.moveTo(cx-w, cy-h*0.5); ctx.lineTo(cx, cy+h*0.5); ctx.lineTo(cx+w, cy-h*0.5);
            ctx.stroke(); break;
        case 2: // circle
            ctx.beginPath();
            ctx.arc(cx, cy, sz*0.28, 0, Math.PI*2);
            ctx.stroke(); break;
        case 3: // twoCircles
            ctx.beginPath(); ctx.arc(cx-w*0.45, cy, sz*0.18, 0, Math.PI*2); ctx.stroke();
            ctx.beginPath(); ctx.arc(cx+w*0.45, cy, sz*0.18, 0, Math.PI*2); ctx.stroke();
            break;
        case 4: // line
            ctx.beginPath(); ctx.moveTo(cx-w, cy); ctx.lineTo(cx+w, cy);
            ctx.stroke(); break;
        case 5: // threeLines
            ctx.beginPath(); ctx.moveTo(cx-w*0.5, cy-h); ctx.lineTo(cx-w*0.5, cy+h); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx, cy-h); ctx.lineTo(cx, cy+h); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx+w*0.5, cy-h); ctx.lineTo(cx+w*0.5, cy+h); ctx.stroke();
            break;
        case 6: // twoPoints
            ctx.beginPath(); ctx.arc(cx-w*0.45, cy, sz*0.09, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(cx+w*0.45, cy, sz*0.09, 0, Math.PI*2); ctx.fill();
            break;
        case 7: // threePoints
            ctx.beginPath(); ctx.arc(cx, cy-h*0.5, sz*0.09, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(cx-w*0.55, cy+h*0.45, sz*0.09, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(cx+w*0.55, cy+h*0.45, sz*0.09, 0, Math.PI*2); ctx.fill();
            break;
        case 8: // waveUp
            ctx.beginPath();
            ctx.moveTo(cx-w, cy+h*0.3);
            ctx.quadraticCurveTo(cx-w*0.3, cy-h, cx, cy);
            ctx.quadraticCurveTo(cx+w*0.3, cy+h, cx+w, cy-h*0.3);
            ctx.stroke(); break;
        case 9: // waveDown
            ctx.beginPath();
            ctx.moveTo(cx-w, cy-h*0.3);
            ctx.quadraticCurveTo(cx-w*0.3, cy+h, cx, cy);
            ctx.quadraticCurveTo(cx+w*0.3, cy-h, cx+w, cy+h*0.3);
            ctx.stroke(); break;
        case 10: // twoL
            ctx.beginPath(); ctx.moveTo(cx-w*0.6, cy-h*0.7); ctx.lineTo(cx-w*0.6, cy+h*0.4); ctx.lineTo(cx+w*0.1, cy+h*0.4); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx+w*0.6, cy-h*0.7); ctx.lineTo(cx+w*0.6, cy+h*0.4); ctx.lineTo(cx-w*0.1, cy+h*0.4); ctx.stroke();
            break;
        case 11: // arc
            ctx.beginPath();
            ctx.moveTo(cx-w*0.8, cy+h*0.3);
            ctx.quadraticCurveTo(cx, cy-h*0.9, cx+w*0.8, cy+h*0.3);
            ctx.stroke(); break;
        case 12: // twoSquares
            ctx.strokeRect(cx-w*0.7, cy-h*0.35, sz*0.22, sz*0.22);
            ctx.strokeRect(cx+w*0.15, cy-h*0.35, sz*0.22, sz*0.22);
            break;
        case 13: // target
            ctx.beginPath(); ctx.arc(cx, cy, sz*0.28, 0, Math.PI*2); ctx.stroke();
            ctx.beginPath(); ctx.arc(cx, cy, sz*0.1, 0, Math.PI*2); ctx.fill();
            break;
        case 14: // dumbbell
            ctx.beginPath(); ctx.arc(cx-w*0.55, cy, sz*0.12, 0, Math.PI*2); ctx.stroke();
            ctx.beginPath(); ctx.arc(cx+w*0.55, cy, sz*0.12, 0, Math.PI*2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx-w*0.43, cy); ctx.lineTo(cx+w*0.43, cy); ctx.stroke();
            break;
        case 15: // singleLine (vertical)
            ctx.beginPath(); ctx.moveTo(cx, cy-h*0.8); ctx.lineTo(cx, cy+h*0.8);
            ctx.stroke(); break;
        case 16: // singlePoint
            ctx.beginPath(); ctx.arc(cx, cy, sz*0.12, 0, Math.PI*2); ctx.fill();
            break;
        case 17: // diamond
            ctx.beginPath();
            ctx.moveTo(cx, cy-h*0.7); ctx.lineTo(cx+w*0.5, cy); ctx.lineTo(cx, cy+h*0.7); ctx.lineTo(cx-w*0.5, cy);
            ctx.closePath(); ctx.stroke(); break;
    }
    ctx.restore();
}

// ═══ DOMINO TEXTURE — médiane verticale, néon, tout Canvas2D ═══

const _dtc = {};
const _bgc = {};

function getDominoBgTex(tint){
    if(_bgc[tint]) return _bgc[tint];
    const S=512, cv=document.createElement('canvas'); cv.width=S; cv.height=S;
    const ctx=cv.getContext('2d');
    const C={
        normal:{glow:'rgba(126,200,227,0.12)'},ice:{glow:'rgba(220,235,248,0.1)'},
        cyan:{glow:'rgba(94,239,255,0.3)'},pink:{glow:'rgba(255,120,180,0.15)'},
        silver:{glow:'rgba(34,211,238,0.15)'},gold:{glow:'rgba(255,215,0,0.15)'},
        emerald:{glow:'rgba(52,211,153,0.15)'},
        cosmic:{glow:'rgba(131,56,236,0.2)'},
        supernovae:{glow:'rgba(255,140,0,0.2)'},
    };
    const glow=(C[tint]||C.normal).glow;
    const r=36, m=8;
    ctx.fillStyle='rgba(14,15,24,0.92)';
    ctx.beginPath();
    ctx.moveTo(m+r,m);ctx.lineTo(S-m-r,m);ctx.quadraticCurveTo(S-m,m,S-m,m+r);
    ctx.lineTo(S-m,S-m-r);ctx.quadraticCurveTo(S-m,S-m,S-m-r,S-m);
    ctx.lineTo(m+r,S-m);ctx.quadraticCurveTo(m,S-m,m,S-m-r);
    ctx.lineTo(m,m+r);ctx.quadraticCurveTo(m,m,m+r,m);
    ctx.closePath();ctx.fill();
    ctx.shadowColor=glow;ctx.shadowBlur=30;ctx.fill();ctx.shadowBlur=0;
    const tex=new THREE.CanvasTexture(cv);
    _bgc[tint]=tex; return tex;
}

function getDominoTex(leftIdx, rightIdx, tint) {
    const k = leftIdx+'|'+rightIdx+'|'+tint;
    if (_dtc[k]) return _dtc[k];

    const S = 512;
    const cv = document.createElement('canvas'); cv.width = S; cv.height = S;
    const ctx = cv.getContext('2d');

    // Couleurs selon tint
    const C={
        normal:  {border:'rgba(126,200,227,0.5)',sep:'rgba(126,200,227,0.3)',icon:'#7ec8e3',glow:'rgba(126,200,227,0.12)'},
        ice:     {border:'rgba(220,235,248,0.45)',sep:'rgba(220,235,248,0.25)',icon:'rgba(230,240,250,0.85)',glow:'rgba(220,235,248,0.1)'},
        cyan:    {border:'rgba(126,200,227,0.9)',sep:'rgba(126,200,227,0.6)',icon:'#5eefff',glow:'rgba(94,239,255,0.3)'},
        pink:    {border:'rgba(255,120,180,0.7)',sep:'rgba(255,120,180,0.4)',icon:'#ff78b4',glow:'rgba(255,120,180,0.15)'},
        silver:  {border:'rgba(34,211,238,0.6)',sep:'rgba(34,211,238,0.35)',icon:'#22d3ee',glow:'rgba(34,211,238,0.15)'},
        gold:    {border:'rgba(255,215,0,0.6)',sep:'rgba(255,215,0,0.35)',icon:'#ffd700',glow:'rgba(255,215,0,0.15)'},
        emerald: {border:'rgba(52,211,153,0.6)',sep:'rgba(52,211,153,0.35)',icon:'#34d399',glow:'rgba(52,211,153,0.15)'},
        cosmic:  {border:'rgba(131,56,236,0.7)',sep:'rgba(196,181,253,0.4)',icon:'#c4b5fd',glow:'rgba(131,56,236,0.2)'},
        supernovae:{border:'rgba(255,140,0,0.7)',sep:'rgba(255,235,59,0.4)',icon:'#ffeb3b',glow:'rgba(255,140,0,0.2)'},
    };
    const c=C[tint]||C.normal;
    const border=c.border, sep=c.sep, iconC=c.icon, glow=c.glow;

    // Fond retiré — géré par bgMesh séparé
    const r = 36, m = 8;

    // Bordure néon
    ctx.beginPath();
    ctx.moveTo(m+r, m); ctx.lineTo(S-m-r, m); ctx.quadraticCurveTo(S-m, m, S-m, m+r);
    ctx.lineTo(S-m, S-m-r); ctx.quadraticCurveTo(S-m, S-m, S-m-r, S-m);
    ctx.lineTo(m+r, S-m); ctx.quadraticCurveTo(m, S-m, m, S-m-r);
    ctx.lineTo(m, m+r); ctx.quadraticCurveTo(m, m, m+r, m);
    ctx.closePath();
    ctx.strokeStyle = border; ctx.lineWidth = 3;
    ctx.shadowColor = border; ctx.shadowBlur = 15;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Séparateur horizontal (médiane)
    ctx.strokeStyle = sep; ctx.lineWidth = 2.5;
    ctx.shadowColor = sep; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.moveTo(m+16, S/2); ctx.lineTo(S-m-16, S/2); ctx.stroke();
    ctx.shadowBlur = 0;

    // Icônes — haut et bas
    const iconSz = S * 0.42;
    drawIcon(ctx, leftIdx,  S*0.5, S*0.25, iconSz, iconC);
    drawIcon(ctx, rightIdx, S*0.5, S*0.75, iconSz, iconC);

    const tex = new THREE.CanvasTexture(cv);
    _dtc[k] = tex;
    return tex;
}

// ═══ TABLEAUX ═══

const GAP = 1.0;
const TABLEAUX = [
    { name:'T1', sats:[
        {x:GAP, y:0, v:[11,13]}, {x:-GAP, y:0, v:[13,10]}
    ] },
    { name:'T2', sats:[
        {x:0, y:-GAP, v:[14,11]}, {x:0, y:GAP, v:[14,16]}
    ] },
    { name:'T3', sats:[
        {x:-GAP, y:-GAP, v:[13,15]}, {x:GAP, y:-GAP, v:[10,13]},
        {x:-GAP, y:GAP, v:[15,14]}, {x:GAP, y:GAP, v:[11,10], state:'silver'}
    ] },
    { name:'T4', sats:[
        {x:GAP, y:-2*GAP, v:[0,11]}, {x:0, y:-2*GAP, v:[17,13]},
        {x:GAP, y:-GAP, v:[11,10]}, {x:GAP, y:GAP, v:[12,8]},
        {x:-GAP, y:-GAP, v:[14,2]}, {x:-GAP, y:GAP, v:[16,5]}
    ] },
];
const TOTAL = TABLEAUX.length;

// ═══ CONFIG ═══

const HALF = 0.52;
const CAM_Z = 18;

const CAM_Z_MIN = 8;    // zoom max (caméra au plus près)
const CAM_Z_MAX = 18;   // zoom min (caméra au plus loin)

function camTargetFor(tIdx, viewIdx){
    if(viewIdx===undefined) viewIdx=mod(currentIdx);
    const pts=[{x:0, y:0}];
    sats.forEach(s=>{
        if(s.tableau===tIdx&&!s.locked) pts.push({x:s.lx, y:s.ly});
    });
    // Inclure la position physique du flottant
    if(lockedSat && tIdx===viewIdx){
        const wp=new THREE.Vector3();lockedSat.mesh.getWorldPosition(wp);
        const lp=cubeGroup.worldToLocal(wp.clone());
        pts.push({x:lp.x, y:lp.y});
    }
    let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
    pts.forEach(p=>{
        minX=Math.min(minX,p.x);maxX=Math.max(maxX,p.x);
        minY=Math.min(minY,p.y);maxY=Math.max(maxY,p.y);
    });
    const cx=(minX+maxX)/2;
    const hw=(maxX-minX)/2+0.6;
    const hh=(maxY-minY)/2+0.6;
    const spread=Math.max(hw,hh)*1.2;
    const z=Math.min(CAM_Z_MAX, Math.max(CAM_Z_MIN, 1.5+spread*3.8));
    return {x:cx, z};
}
function camTargetForStatic(tIdx){
    const tab=TABLEAUX[tIdx]; if(!tab)return {x:0,z:CAM_Z};
    // Inclure le cube central
    const pts=[{x:0, y:0}];
    tab.sats.forEach(s=>pts.push({x:s.x, y:s.y}));
    let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
    pts.forEach(p=>{
        minX=Math.min(minX,p.x);maxX=Math.max(maxX,p.x);
        minY=Math.min(minY,p.y);maxY=Math.max(maxY,p.y);
    });
    const cx=(minX+maxX)/2;
    const hw=(maxX-minX)/2+0.6;
    const hh=(maxY-minY)/2+0.6;
    const spread=Math.max(hw,hh)*1.2;
    const z=Math.min(CAM_Z_MAX, Math.max(CAM_Z_MIN, 1.5+spread*3.8));
    return {x:cx, z};
}

let targetCamX=0;
function refreshZoom(){
    const t=camTargetFor(mod(currentIdx));
    targetCamX=t.x;targetCamZ=t.z;
}

const FACE_ROT=[0, Math.PI/2, Math.PI, -Math.PI/2];

// ═══ THREE SETUP ═══

const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setSize(600,600);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setClearColor(0x0c0d14);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(40,1,0.1,100);
const initCam=camTargetForStatic(0);
camera.position.set(initCam.x,0,initCam.z);camera.lookAt(0,0,0);

scene.add(new THREE.AmbientLight(0xffffff,0.8));

// ═══ HELPERS ═══

function rrShape(w,h,r){
    const s=new THREE.Shape(),hw=w/2,hh=h/2;
    s.moveTo(-hw+r,-hh);s.lineTo(hw-r,-hh);
    s.quadraticCurveTo(hw,-hh,hw,-hh+r);s.lineTo(hw,hh-r);
    s.quadraticCurveTo(hw,hh,hw-r,hh);s.lineTo(-hw+r,hh);
    s.quadraticCurveTo(-hw,hh,-hw,hh-r);s.lineTo(-hw,-hh+r);
    s.quadraticCurveTo(-hw,-hh,-hw+r,-hh);return s;
}

function placeSat(sat,faceRotY){
    const q=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0),faceRotY);
    sat.mesh.position.copy(new THREE.Vector3(sat.lx,sat.ly,HALF+SAT_LIFT).applyQuaternion(q));
    sat.mesh.quaternion.copy(q);
    sat.baseQuat = q.clone(); // référence pour le breathing
}

// ═══ PORTE ═══

let porteValue=[13,11];
const cubeGroup=new THREE.Group();scene.add(cubeGroup);

function makePorteTex(val){ return getDominoTex(val[0], val[1], 'ice'); }
const cubeMats=[];for(let i=0;i<6;i++)cubeMats.push(new THREE.MeshBasicMaterial({map:makePorteTex(porteValue),transparent:true}));
const cubeMesh=new THREE.Mesh(new THREE.BoxGeometry(1,1,1),cubeMats);cubeMesh.userData.isCube=true;cubeGroup.add(cubeMesh);

// Halo ice — sprite radial gradient face-caméra
const haloCanvas=document.createElement('canvas');haloCanvas.width=256;haloCanvas.height=256;
const hctx=haloCanvas.getContext('2d');
const grad=hctx.createRadialGradient(128,128,0,128,128,128);
grad.addColorStop(0,'rgba(220,235,248,0.25)');
grad.addColorStop(0.3,'rgba(200,220,240,0.12)');
grad.addColorStop(0.6,'rgba(180,210,235,0.04)');
grad.addColorStop(1,'rgba(180,210,235,0)');
hctx.fillStyle=grad;hctx.fillRect(0,0,256,256);
const haloTex=new THREE.CanvasTexture(haloCanvas);
const haloSpriteMat=new THREE.SpriteMaterial({map:haloTex,transparent:true,opacity:0.7,depthWrite:false});
const haloSprite=new THREE.Sprite(haloSpriteMat);
haloSprite.scale.set(2.8,2.8,1);
cubeGroup.add(haloSprite);

function updatePorte(val){porteValue=val;const tex=makePorteTex(val);cubeMats.forEach(m=>{m.map=tex;m.needsUpdate=true;});}

// ═══ GRILLE DAMIER — plaquée sur chaque face visible ═══

function makeGridTexture(cols, rows){
    const S=1024, cv=document.createElement('canvas'); cv.width=S*cols/Math.max(cols,rows); cv.height=S*rows/Math.max(cols,rows);
    // Normaliser pour que les cellules soient carrées dans la texture
    const cW=cv.width/cols, cH=cv.height/rows;
    const ctx=cv.getContext('2d');
    // Fond opaque sombre
    ctx.fillStyle='rgba(12,13,20,0.95)';
    ctx.fillRect(0,0,cv.width,cv.height);
    // Damier subtil
    for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){
            const dark=(r+c)%2===0;
            ctx.fillStyle=dark?'rgba(126,200,227,0.025)':'rgba(126,200,227,0.055)';
            ctx.fillRect(c*cW, r*cH, cW, cH);
        }
    }
    // Lignes de grille
    ctx.strokeStyle='rgba(126,200,227,0.10)';
    ctx.lineWidth=1;
    for(let c=0;c<=cols;c++){
        ctx.beginPath();ctx.moveTo(c*cW,0);ctx.lineTo(c*cW,cv.height);ctx.stroke();
    }
    for(let r=0;r<=rows;r++){
        ctx.beginPath();ctx.moveTo(0,r*cH);ctx.lineTo(cv.width,r*cH);ctx.stroke();
    }
    return new THREE.CanvasTexture(cv);
}

// Grille pour chaque face — calculée en unités de GAP, centrée sur les positions
const gridMeshes=[];
function createFaceGrid(tIdx){
    const tab=TABLEAUX[tIdx];
    // Trouver l'étendue en unités de GAP (incluant la porte à 0,0)
    let minGX=0,maxGX=0,minGY=0,maxGY=0;
    tab.sats.forEach(s=>{
        const gx=Math.round(s.x/GAP), gy=Math.round(s.y/GAP);
        minGX=Math.min(minGX,gx);maxGX=Math.max(maxGX,gx);
        minGY=Math.min(minGY,gy);maxGY=Math.max(maxGY,gy);
    });
    // Ajouter 1 case de marge tout autour
    minGX-=1;maxGX+=1;minGY-=1;maxGY+=1;
    const cols=maxGX-minGX+1, rows=maxGY-minGY+1;
    // Centre de la grille en coordonnées monde
    const cx=(minGX+maxGX)/2*GAP, cy=(minGY+maxGY)/2*GAP;
    const w=cols*GAP, h=rows*GAP;
    const tex=makeGridTexture(cols,rows);
    const plane=new THREE.Mesh(
        new THREE.PlaneGeometry(w,h),
        new THREE.MeshBasicMaterial({map:tex,transparent:true,side:THREE.FrontSide,depthWrite:false})
    );
    plane.renderOrder=-2;
    plane.userData.gridTableau=tIdx;
    plane.userData.gridCx=cx;
    plane.userData.gridCy=cy;
    cubeGroup.add(plane);
    gridMeshes.push({mesh:plane,tableau:tIdx,cx,cy});
    return plane;
}

TABLEAUX.forEach((_,i)=>createFaceGrid(i));

function assignGrids(){
    const faceMap=[[mod(currentIdx),0],[mod(currentIdx+1),1],[mod(currentIdx-1),3]];
    gridMeshes.forEach(g=>{
        const entry=faceMap.find(f=>f[0]===g.tableau);
        if(entry){
            const q=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0),FACE_ROT[entry[1]]);
            const localPos=new THREE.Vector3(g.cx,g.cy,HALF+0.005).applyQuaternion(q);
            g.mesh.position.copy(localPos);
            g.mesh.quaternion.copy(q);
            g.mesh.visible=true;
        } else {
            g.mesh.visible=false;
        }
    });
}

const sats=[];
const SAT_DEPTH = 0.06;  // épaisseur du domino
const SAT_LIFT = 0.08;   // hauteur de flottement au-dessus de la face
function createSatMesh(value,tint){
    const grp=new THREE.Group(), SZ=1.0, R=0.12;

    // ── Face avant (texture domino — sans fond, icônes+contours+médiane) ──
    const nMesh=new THREE.Mesh(
        new THREE.PlaneGeometry(SZ, SZ),
        new THREE.MeshBasicMaterial({map:getDominoTex(value[0],value[1],tint||'normal'),transparent:true,side:THREE.DoubleSide})
    );
    nMesh.position.z = SAT_DEPTH/2 + 0.001;
    grp.add(nMesh);

    // ── Fond arrondi séparé (contrôlé par le variateur) ──
    const bgMesh=new THREE.Mesh(
        new THREE.PlaneGeometry(SZ, SZ),
        new THREE.MeshBasicMaterial({map:getDominoBgTex(tint||'normal'),transparent:true,opacity:1.0,side:THREE.DoubleSide})
    );
    bgMesh.position.z = SAT_DEPTH/2 + 0.0005;
    grp.add(bgMesh);

    // ── Corps 3D (épaisseur) — arrondi, semi-transparent ──
    const bodyShape = rrShape(SZ, SZ, R);
    const extrudeSettings = {depth: SAT_DEPTH, bevelEnabled: false};
    const bodyGeo = new THREE.ExtrudeGeometry(bodyShape, extrudeSettings);
    bodyGeo.translate(0, 0, -SAT_DEPTH/2);
    const sideMat = new THREE.MeshBasicMaterial({color:0x141520, transparent:true, opacity:0.45});sideMat._baseOp=0.45;
    const faceMat = new THREE.MeshBasicMaterial({color:0x0a0b12, transparent:true, opacity:0.25});faceMat._baseOp=0.25;
    const boxMesh = new THREE.Mesh(bodyGeo, [faceMat, sideMat]);
    grp.add(boxMesh);

    // ── Liseré néon sur les arêtes ──
    const edgesGeo = new THREE.EdgesGeometry(bodyGeo, 15);
    const edgeLines = new THREE.LineSegments(edgesGeo, new THREE.LineBasicMaterial({color:0x7ec8e3, transparent:true, opacity:0.18}));
    grp.add(edgeLines);

    // ── Ombre portée ──
    const shadowCanvas = document.createElement('canvas'); shadowCanvas.width=128; shadowCanvas.height=128;
    const sctx = shadowCanvas.getContext('2d');
    const sg = sctx.createRadialGradient(64,64,10,64,64,60);
    sg.addColorStop(0,'rgba(0,0,0,0.35)');
    sg.addColorStop(0.5,'rgba(0,0,0,0.15)');
    sg.addColorStop(1,'rgba(0,0,0,0)');
    sctx.fillStyle=sg; sctx.fillRect(0,0,128,128);
    const shadowTex = new THREE.CanvasTexture(shadowCanvas);
    const shadowMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(SZ*1.25, SZ*1.25),
        new THREE.MeshBasicMaterial({map:shadowTex, transparent:true, opacity:0.6, depthWrite:false})
    );
    shadowMesh.position.z = -SAT_DEPTH/2 - SAT_LIFT + 0.005;
    grp.add(shadowMesh);

    // ── Glow (derrière, pour état locked) ──
    const gShape=rrShape(SZ+0.06,SZ+0.06,R+0.03);
    const gMesh=new THREE.Mesh(new THREE.ShapeGeometry(gShape),new THREE.MeshBasicMaterial({color:0x7ec8e3,transparent:true,opacity:0}));
    gMesh.position.z=-SAT_DEPTH/2-0.005;grp.add(gMesh);
    // Halo
    const hMesh=new THREE.Mesh(new THREE.ShapeGeometry(rrShape(SZ+0.2,SZ+0.2,R+0.08)),new THREE.MeshBasicMaterial({color:0x7ec8e3,transparent:true,opacity:0}));
    hMesh.position.z=-SAT_DEPTH/2-0.01;grp.add(hMesh);

    grp.userData={numMesh:nMesh,bgMesh:bgMesh,glowMesh:gMesh,haloMesh:hMesh,boxMesh:boxMesh,edgeLines:edgeLines,shadowMesh:shadowMesh,isSat:true};
    return grp;
}

TABLEAUX.forEach((tab,tIdx)=>{tab.sats.forEach((sd,sIdx)=>{
    const st=sd.state||'white';
    const mesh=createSatMesh(sd.v,st!=='white'?st:undefined);mesh.visible=false;cubeGroup.add(mesh);
    sats.push({id:tIdx*100+sIdx,value:sd.v,state:st,tableau:tIdx,origTableau:tIdx,lx:sd.x,ly:sd.y,origLx:sd.x,origLy:sd.y,locked:false,mesh});
});});

// ═══ STATE ═══

let lockedSat=null,currentIdx=0,busy=false,isAnimating=false,navDir=0;
let isFlipped=false, flipDir=0;
let targetCamZ=camTargetForStatic(0).z;
const targetQuat=new THREE.Quaternion();
function mod(n){return((n%TOTAL)+TOTAL)%TOTAL;}

// ═══ ASSIGN ═══

function assignFaces(){
    const faceMap=[[mod(currentIdx),0],[mod(currentIdx+1),1],[mod(currentIdx-1),3]];
    sats.forEach(sat=>{
        if(sat.locked)return;
        const entry=faceMap.find(f=>f[0]===sat.tableau);
        if(entry){placeSat(sat,FACE_ROT[entry[1]]);if(sat.mesh.parent!==cubeGroup)cubeGroup.attach(sat.mesh);}
    });
    assignGrids();
}

// ═══ NAV ═══

// Helper: masquer tout satellite aux mêmes coordonnées que la source du locked, tous tableaux confondus
function isHiddenBySrc(s){
    return lockedSat&&!s.locked&&Math.abs(s.lx-lockedSat.srcLx)<0.2&&Math.abs(s.ly-lockedSat.srcLy)<0.2;
}

function navRight(){
    if(busy||isAnimating)return;busy=true;isAnimating=true;navDir=1;flipDir=0;
    targetQuat.setFromAxisAngle(new THREE.Vector3(0,1,0),-Math.PI/2);
    const nextIdx=mod(currentIdx+1);
    const t=camTargetFor(nextIdx, nextIdx);targetCamX=t.x;targetCamZ=t.z;
    const show=[mod(currentIdx),nextIdx];
    sats.forEach(s=>{if(!s.locked&&show.includes(s.tableau))s.mesh.visible=!isHiddenBySrc(s);});
}
function navLeft(){
    if(busy||isAnimating)return;busy=true;isAnimating=true;navDir=-1;flipDir=0;
    targetQuat.setFromAxisAngle(new THREE.Vector3(0,1,0),Math.PI/2);
    const nextIdx=mod(currentIdx-1);
    const t=camTargetFor(nextIdx, nextIdx);targetCamX=t.x;targetCamZ=t.z;
    const show=[mod(currentIdx),nextIdx];
    sats.forEach(s=>{if(!s.locked&&show.includes(s.tableau))s.mesh.visible=!isHiddenBySrc(s);});
}

function flipUp(){
    if(busy||isAnimating)return;busy=true;isAnimating=true;navDir=0;flipDir=1;
    targetQuat.setFromAxisAngle(new THREE.Vector3(1,0,0), Math.PI);
    isFlipped=!isFlipped;
}
function flipDown(){
    if(busy||isAnimating)return;busy=true;isAnimating=true;navDir=0;flipDir=-1;
    targetQuat.setFromAxisAngle(new THREE.Vector3(1,0,0), -Math.PI);
    isFlipped=!isFlipped;
}

function onRotationComplete(){
    if(flipDir!==0){
        cubeGroup.quaternion.identity();targetQuat.identity();flipDir=0;
        // Porte : re-swap pour annuler le swap mi-course (la porte résiste au flip)
        updatePorte([porteValue[1],porteValue[0]]);
        const fIdx=mod(currentIdx);
        sats.forEach(s=>{
            if(s.tableau===fIdx&&!s.locked&&s.tableau>=0){
                s.ly=-s.ly;
                s.mesh.scale.y *= -1;
            }
        });
        assignFaces();isAnimating=false;busy=false;refreshZoom();updateUI();
        setTimeout(checkFusions,100);
    } else {
        currentIdx=mod(currentIdx+navDir);cubeGroup.quaternion.identity();targetQuat.identity();navDir=0;
        assignFaces();isAnimating=false;busy=false;updateUI();
    }
}

// ═══ TAP ═══

function tapLock(sat){
    if(busy||isAnimating)return;if(lockedSat)tapRelease(lockedSat);
    sat.locked=true;lockedSat=sat;sat.srcTableau=sat.tableau;sat.srcLx=sat.lx;sat.srcLy=sat.ly;
    sat.savedScaleY=sat.mesh.scale.y; // préserver l'orientation flip
    // Masquer tout satellite à la même position source (évite superposition pendant navigation)
    sats.forEach(s=>{
        if(s!==sat&&!s.locked&&s.tableau===sat.srcTableau&&Math.abs(s.lx-sat.srcLx)<0.2&&Math.abs(s.ly-sat.srcLy)<0.2)
            s.mesh.visible=false;
    });
    scene.attach(sat.mesh);refreshZoom();updateUI();
}
function tapRelease(sat){
    if(!sat.locked)return;
    if(isAnimating||busy)return;
    const wp=new THREE.Vector3();sat.mesh.getWorldPosition(wp);
    cubeGroup.attach(sat.mesh);
    const fIdx=mod(currentIdx);
    const lp=cubeGroup.worldToLocal(wp.clone());
    const lx=lp.x,ly=lp.y;
    let closest=null,cd=Infinity;
    for(const o of sats){if(o===sat||o.locked||o.tableau!==fIdx)continue;const d=Math.hypot(o.lx-lx,o.ly-ly);if(d<cd){cd=d;closest=o;}}
    const savedSY=sat.savedScaleY||1;
    if(closest&&cd<GAP*0.9){
        const cT=closest.tableau,cX=closest.lx,cY=closest.ly;
        const closestScaleY=closest.mesh.scale.y;
        // Le satellite flottant prend la place du closest
        sat.tableau=cT;sat.lx=cX;sat.ly=cY;placeSat(sat,FACE_ROT[0]);sat.mesh.scale.set(1,savedSY,1);
        // Le closest prend la place source (peut être un autre tableau)
        closest.tableau=sat.srcTableau;closest.lx=sat.srcLx;closest.ly=sat.srcLy;
        closest.mesh.scale.set(1,closestScaleY,1);
        closest.mesh.visible=true;
    } else {
        sat.tableau=fIdx;sat.lx=lx;sat.ly=ly;placeSat(sat,FACE_ROT[0]);sat.mesh.scale.set(1,savedSY,1);
    }
    sat.locked=false;lockedSat=null;
    assignFaces();
    updateUI();
    setTimeout(checkFusions,100);
}

// ═══ FUSION ADAM ═══
// Règle : si deux dominos adjacents verticalement ont la même icône sur les faces qui se touchent,
// ils fusionnent. La face BASSE du domino du haut doit matcher la face HAUTE du domino du bas.
// Si un domino est flippé (scale.y < 0), ses faces visuelles sont inversées.
// Le résultat monte d'un état. Le perdant disparaît.

const STATE_CHAIN=['white','silver','gold','emerald','cosmic','supernovae'];
function nextState(st){ const i=STATE_CHAIN.indexOf(st||'white'); return i<STATE_CHAIN.length-1?STATE_CHAIN[i+1]:STATE_CHAIN[i]; }

function getVisualTop(sat){
    const flipped=sat.mesh.scale.y<0;
    return flipped?sat.value[1]:sat.value[0];
}
function getVisualBottom(sat){
    const flipped=sat.mesh.scale.y<0;
    return flipped?sat.value[0]:sat.value[1];
}

function removeSat(sat){
    sat.mesh.visible=false;
    sat.tableau=-999; // exiler
    sat.lx=99;sat.ly=99;
}

function updateSatVisual(sat){
    const st=sat.state||'white';
    const tint=st!=='white'?st:'normal';
    sat.mesh.userData.numMesh.material.map=getDominoTex(sat.value[0],sat.value[1],tint);
    sat.mesh.userData.bgMesh.material.map=getDominoBgTex(tint);
}

let fusionQueue=[];
let fusionAnimating=false;

function checkFusions(){
    const fIdx=mod(currentIdx);
    const faceSats=sats.filter(s=>s.tableau===fIdx&&!s.locked&&s.tableau>=0);
    let fused=false;
    
    // Vérifier adjacence verticale : pour chaque paire haut/bas
    for(let i=0;i<faceSats.length;i++){
        const a=faceSats[i];
        if(a.tableau<0)continue;
        for(let j=i+1;j<faceSats.length;j++){
            const b=faceSats[j];
            if(b.tableau<0)continue;
            // Adjacents verticalement ? (même x, différence y = GAP)
            if(Math.abs(a.lx-b.lx)<0.15 && Math.abs(Math.abs(a.ly-b.ly)-GAP)<0.15){
                // Qui est au-dessus ? (y plus grand = plus haut visuellement dans Three.js)
                const upper=a.ly>b.ly?a:b;
                const lower=a.ly>b.ly?b:a;
                // Face basse du upper doit = face haute du lower
                const ubottom=getVisualBottom(upper);
                const ltop=getVisualTop(lower);
                if(ubottom===ltop){
                    // FUSION ! Le upper absorbe le lower
                    upper.state=nextState(upper.state);
                    updateSatVisual(upper);
                    removeSat(lower);
                    fused=true;
                    // Flash visuel
                    flashFusion(upper);
                    break;
                }
            }
            // Adjacents horizontalement ? (même y, différence x = GAP)
            if(Math.abs(a.ly-b.ly)<0.15 && Math.abs(Math.abs(a.lx-b.lx)-GAP)<0.15){
                // Qui est à gauche ?
                const left=a.lx<b.lx?a:b;
                const right=a.lx<b.lx?b:a;
                // Face basse du left = face haute du right (lecture : droite du left vs gauche du right)
                // Pour l'horizontale, on utilise aussi haut/bas car les dominos sont verticaux (haut/bas)
                // Règle horizontale : face basse du left doit = face haute du right
                const lbottom=getVisualBottom(left);
                const rtop=getVisualTop(right);
                if(lbottom===rtop){
                    left.state=nextState(left.state);
                    updateSatVisual(left);
                    removeSat(right);
                    fused=true;
                    flashFusion(left);
                    break;
                }
            }
        }
        if(fused)break;
    }
    // Chaîner les fusions
    if(fused){
        setTimeout(()=>{
            assignFaces();refreshZoom();updateUI();
            checkFusions();
        },350);
    }
}

// Flash visuel lors d'une fusion
function flashFusion(sat){
    const ud=sat.mesh.userData;
    ud.glowMesh.material.color.set(0xffffff);
    ud.glowMesh.material.opacity=0.8;
    ud.haloMesh.material.color.set(0xffffff);
    ud.haloMesh.material.opacity=0.5;
    // Pulse scale
    sat.mesh.scale.set(1.15,sat.mesh.scale.y>0?1.15:-1.15,1.15);
    setTimeout(()=>{
        sat.mesh.scale.set(1,sat.mesh.scale.y>0?1:-1,1);
        ud.glowMesh.material.opacity=0;
        ud.haloMesh.material.opacity=0;
    },300);
}

// ═══ DRAG SWAP ═══

let swapAnim=null;

function dragSwap(sat, dirX, dirY){
    if(!sat||sat.locked||busy||isAnimating||swapAnim)return false;
    const fIdx=mod(currentIdx);
    if(sat.tableau!==fIdx)return false;
    const st=sat.state||'white';

    // Direction constraints par état (white = libre)
    if(st==='silver' && (dirY!==0||dirX===0)) return false;
    if(st==='emerald' && (dirX!==0||dirY===0)) return false;
    if(st==='gold' && (dirX===0||dirY===0)) return false;

    const tx=sat.lx+dirX*GAP, ty=sat.ly+dirY*GAP;
    const target=sats.find(s=>s!==sat&&!s.locked&&s.tableau===fIdx&&Math.abs(s.lx-tx)<0.2&&Math.abs(s.ly-ty)<0.2);
    if(target){
        const aFrom={x:sat.lx,y:sat.ly}, bFrom={x:target.lx,y:target.ly};
        sat.lx=bFrom.x;sat.ly=bFrom.y;target.lx=aFrom.x;target.ly=aFrom.y;
        swapAnim={pairs:[
            {mesh:sat.mesh, from:aFrom, to:bFrom},
            {mesh:target.mesh, from:bFrom, to:aFrom},
        ], t:0};
        return true;
    }
    return false;
}

function dragPorte(dirX, dirY){
    if(busy||isAnimating||swapAnim)return false;
    const fIdx=mod(currentIdx);
    const tx=dirX*GAP, ty=dirY*GAP;
    const target=sats.find(s=>!s.locked&&s.tableau===fIdx&&Math.abs(s.lx-tx)<0.2&&Math.abs(s.ly-ty)<0.2);
    if(!target)return false;
    
    // Créer un ghost de la porte (plane temporaire) qui va voyager vers la position du satellite
    const ghostMesh=new THREE.Mesh(
        new THREE.PlaneGeometry(1,1),
        new THREE.MeshBasicMaterial({map:getDominoTex(porteValue[0],porteValue[1],'ice'),transparent:true})
    );
    ghostMesh.position.set(0,0,HALF+0.02);
    cubeGroup.add(ghostMesh);
    
    // Masquer la face avant du cube pendant le swap
    cubeMats[4].opacity=0;
    haloSprite.visible=false;
    
    // Stocker les valeurs pour le swap final
    swapAnim={
        pairs:[{mesh:target.mesh, from:{x:target.lx,y:target.ly}, to:{x:0,y:0}}],
        ghost:ghostMesh, ghostFrom:{x:0,y:0}, ghostTo:{x:target.lx,y:target.ly},
        target:target, oldPorte:[...porteValue], oldSat:[...target.value],
        t:0, isPorteSwap:true
    };
    return true;
}

function tickSwapAnim(dt){
    if(!swapAnim)return;
    swapAnim.t+=dt*2.5; // plus lent pour bien voir
    const p=Math.min(1, swapAnim.t);
    const ease=p<0.5?2*p*p:(1-Math.pow(-2*p+2,2)/2);
    
    if(swapAnim.isPorteSwap){
        // Satellite va vers le centre
        swapAnim.pairs.forEach(pair=>{
            pair.mesh.position.x=pair.from.x+(pair.to.x-pair.from.x)*ease;
            pair.mesh.position.y=pair.from.y+(pair.to.y-pair.from.y)*ease;
        });
        // Ghost porte va vers la position du satellite
        const g=swapAnim.ghost;
        g.position.x=swapAnim.ghostFrom.x+(swapAnim.ghostTo.x-swapAnim.ghostFrom.x)*ease;
        g.position.y=swapAnim.ghostFrom.y+(swapAnim.ghostTo.y-swapAnim.ghostFrom.y)*ease;
        g.position.z=HALF+0.02;
        
        if(p>=1){
            const target=swapAnim.target;
            const flipped=target.mesh.scale.y<0;
            // Porte reçoit les valeurs du sat — si le sat était flippé, ses valeurs visuelles sont inversées
            if(flipped) updatePorte([swapAnim.oldSat[1],swapAnim.oldSat[0]]);
            else updatePorte(swapAnim.oldSat);
            // Sat reçoit les valeurs de la porte — si le sat est flippé, inverser pour compenser le scale.y
            if(flipped) target.value=[swapAnim.oldPorte[1],swapAnim.oldPorte[0]];
            else target.value=swapAnim.oldPorte;
            const st=target.state||'white';
            const tint=st!=='white'?st:'normal';
            target.mesh.userData.numMesh.material.map=getDominoTex(target.value[0],target.value[1],tint);
            // Nettoyer le ghost
            cubeGroup.remove(swapAnim.ghost);
            swapAnim.ghost.geometry.dispose();
            swapAnim.ghost.material.dispose();
            // Restaurer la face avant du cube
            cubeMats[4].opacity=1;
            haloSprite.visible=true;
            // Replacer le satellite
            placeSat(target,FACE_ROT[0]);
            assignFaces();swapAnim=null;refreshZoom();updateUI();
            setTimeout(checkFusions,100);
        }
    } else {
        swapAnim.pairs.forEach(pair=>{
            pair.mesh.position.x=pair.from.x+(pair.to.x-pair.from.x)*ease;
            pair.mesh.position.y=pair.from.y+(pair.to.y-pair.from.y)*ease;
        });
        if(p>=1){
            swapAnim.pairs.forEach(pair=>{
                const sat=sats.find(s=>s.mesh===pair.mesh);
                if(sat&&!sat.locked) placeSat(sat,FACE_ROT[0]);
            });
            assignFaces();swapAnim=null;refreshZoom();updateUI();
            setTimeout(checkFusions,100);
        }
    }
}

// ═══ RAYCAST ═══

const raycaster=new THREE.Raycaster(),mouse=new THREE.Vector2();
function getSatAt(cx,cy){
    const r=canvas.getBoundingClientRect();mouse.x=((cx-r.left)/r.width)*2-1;mouse.y=-((cy-r.top)/r.height)*2+1;
    raycaster.setFromCamera(mouse,camera);const all=[];
    sats.forEach(s=>{if(s.mesh.visible)s.mesh.traverse(c=>{if(c.isMesh)all.push(c);});});
    for(const h of raycaster.intersectObjects(all,false)){let o=h.object;while(o){if(o.userData&&o.userData.isSat){const s=sats.find(x=>x.mesh===o);if(s)return s;}o=o.parent;}}return null;
}

function isCubeAt(cx,cy){
    const r=canvas.getBoundingClientRect();mouse.x=((cx-r.left)/r.width)*2-1;mouse.y=-((cy-r.top)/r.height)*2+1;
    raycaster.setFromCamera(mouse,camera);
    const hits=raycaster.intersectObject(cubeMesh,false);
    return hits.length>0;
}

// ═══ POINTER ═══

let pStart=null,pMoved=false,pSat=null,pCube=false;
canvas.addEventListener('pointerdown',e=>{pStart={x:e.clientX,y:e.clientY};pMoved=false;pSat=getSatAt(e.clientX,e.clientY);pCube=!pSat&&isCubeAt(e.clientX,e.clientY);canvas.setPointerCapture(e.pointerId);});
canvas.addEventListener('pointermove',e=>{if(pStart&&Math.hypot(e.clientX-pStart.x,e.clientY-pStart.y)>10)pMoved=true;});
canvas.addEventListener('pointerup',e=>{
    if(!pStart)return;const dx=e.clientX-pStart.x,dy=e.clientY-pStart.y,dist=Math.hypot(dx,dy);
    if(!pMoved){
        const sat=getSatAt(e.clientX,e.clientY);
        if(sat){if(sat.locked)tapRelease(sat);else tapLock(sat);}
        else if(lockedSat)tapRelease(lockedSat);
    } else if(dist>=15){
        // Swipe depuis la porte
        if(pCube){
            let dirX=0,dirY=0;
            if(Math.abs(dx)>Math.abs(dy)){dirX=dx>0?1:-1;}
            else{dirY=dy>0?-1:1;}
            if(dragPorte(dirX,dirY)){pStart=null;pSat=null;pCube=false;return;}
        }
        // Swipe depuis un satellite (swap entre sats si non-white)
        if(pSat&&!pSat.locked){
            let dirX=0,dirY=0;
            const st=pSat.state||'white';
            if(st==='gold'){
                // Diagonal: both axes
                dirX=dx>0?1:-1;
                dirY=dy>0?-1:1;
            } else {
                if(Math.abs(dx)>Math.abs(dy)){dirX=dx>0?1:-1;}
                else{dirY=dy>0?-1:1;}
            }
            if(dragSwap(pSat,dirX,dirY)){pStart=null;pSat=null;pCube=false;return;}
        }
        if(Math.abs(dx)>=Math.abs(dy)){dx>0?navRight():navLeft();}
        else{dy<0?flipUp():flipDown();}
    }
    pStart=null;pSat=null;pCube=false;
});
canvas.addEventListener('pointercancel',()=>{pStart=null;pSat=null;pCube=false;});

// ═══ WHEEL + KEY ═══

let wx=0,wy=0,wcd=false,wt=null;
canvas.addEventListener('wheel',e=>{
    e.preventDefault();
    if(wcd||busy||isAnimating)return;
    if(Math.abs(e.deltaX)>Math.abs(e.deltaY)){wx+=e.deltaX;}else{wy+=e.deltaY;}
    clearTimeout(wt);wt=setTimeout(()=>{wx=0;wy=0;},100);
    if(Math.abs(wx)>50){
        wx>0?navRight():navLeft();
        wx=0;wy=0;wcd=true;setTimeout(()=>{wcd=false;},600);
    } else if(Math.abs(wy)>50){
        wy>0?flipDown():flipUp();
        wx=0;wy=0;wcd=true;setTimeout(()=>{wcd=false;},600);
    }
},{passive:false});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'){navRight();e.preventDefault();}else if(e.key==='ArrowLeft'){navLeft();e.preventDefault();}else if(e.key==='ArrowUp'){flipUp();e.preventDefault();}else if(e.key==='ArrowDown'){flipDown();e.preventDefault();}});

// ═══ UI ═══

const dotsEl=document.getElementById('navDots');
for(let i=0;i<TOTAL;i++){const d=document.createElement('div');d.className='nav-dot'+(i===0?' active':'');dotsEl.appendChild(d);}
function updateUI(){
    const idx=mod(currentIdx);
    const flipTag=isFlipped?' ⟳':'';
    document.getElementById('faceLabel').textContent=`${idx+1} / ${TOTAL}${flipTag}`;
    dotsEl.querySelectorAll('.nav-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
    const c=sats.filter(s=>s.tableau===idx&&!s.locked).length;
    let t=`T${idx+1} [porte] · ${c} sat${c>1?'s':''}`;if(lockedSat)t+=` · ⟐ flotte`;
    if(isFlipped)t+=` · retourné`;
    document.getElementById('infoLine').textContent=t;
}

// ═══ RESET ═══

document.getElementById('btnReset').addEventListener('click',()=>{
    if(lockedSat){cubeGroup.attach(lockedSat.mesh);lockedSat.locked=false;}lockedSat=null;
    let si=0;TABLEAUX.forEach((tab,tIdx)=>{tab.sats.forEach(sd=>{
        const sat=sats[si++];sat.value=sd.v;sat.state=sd.state||'white';sat.tableau=tIdx;sat.origTableau=tIdx;
        sat.lx=sd.x;sat.ly=sd.y;sat.origLx=sd.x;sat.origLy=sd.y;sat.locked=false;
        if(sat.mesh.parent!==cubeGroup)cubeGroup.attach(sat.mesh);sat.mesh.scale.set(1,1,1);
        const ud=sat.mesh.userData;ud.glowMesh.material.opacity=0;ud.haloMesh.material.opacity=0;
        const tint=sat.state!=='white'?sat.state:'normal';
        ud.numMesh.material.map=getDominoTex(sd.v[0],sd.v[1],tint);
    });});
    updatePorte([13,11]);cubeGroup.quaternion.identity();targetQuat.identity();
    currentIdx=0;isAnimating=false;busy=false;navDir=0;flipDir=0;isFlipped=false;
    refreshZoom();camera.position.set(targetCamX,0,targetCamZ);assignFaces();updateUI();
});

// ═══ EXPORT JSON ═══

document.getElementById('btnExport').addEventListener('click',()=>{
    const data={tableaux:[]};
    // Regrouper les sats par tableau
    const groups={};
    sats.forEach(s=>{
        if(!groups[s.tableau]) groups[s.tableau]=[];
        const entry={x:Math.round(s.lx*100)/100, y:Math.round(s.ly*100)/100, v:[...s.value]};
        if(s.state&&s.state!=='white') entry.state=s.state;
        groups[s.tableau].push(entry);
    });
    // Trier par index de tableau
    const keys=Object.keys(groups).map(Number).sort((a,b)=>a-b);
    keys.forEach(k=>{
        data.tableaux.push({name:'T'+(k+1), sats:groups[k]});
    });
    data.porte=[...porteValue];
    const json=JSON.stringify(data,null,2);
    // Copier dans le presse-papier
    navigator.clipboard.writeText(json).then(()=>{
        document.getElementById('infoLine').textContent='JSON copié !';
        setTimeout(updateUI,1500);
    }).catch(()=>{
        // Fallback: prompt
        prompt('JSON exporté :', json);
    });
});

// ═══ AXE CENTRAL ═══

document.getElementById('btnCenter').addEventListener('click',()=>{
    const el=document.getElementById('centerLine');
    el.style.display=el.style.display==='none'?'block':'none';
});

// ═══ BACKGROUND MODES — multi-couches scrollantes ═══

const BG_MODES = ['stars','grid','nebula','dust','off'];
const BG_LABELS = ['étoiles ✦','grille ⊞','nebula ☁','poussière ·','off'];
let bgMode = 0;

// ── Mode 0 : Étoiles — 3 couches à profondeurs différentes ──
const starLayers = [];
const STAR_CONFIGS = [
    {count:80,  depth:[-8,-25],  speed:2.5, size:0.18, opacity:0.55, spread:50},
    {count:150, depth:[-25,-55], speed:1.2, size:0.10, opacity:0.35, spread:65},
    {count:250, depth:[-55,-90], speed:0.4, size:0.05, opacity:0.18, spread:80},
];
STAR_CONFIGS.forEach(cfg=>{
    const geo=new THREE.BufferGeometry();
    const pos=new Float32Array(cfg.count*3);
    const speeds=new Float32Array(cfg.count);
    for(let i=0;i<cfg.count;i++){
        pos[i*3]=(Math.random()-0.5)*cfg.spread;
        pos[i*3+1]=(Math.random()-0.5)*cfg.spread*0.7;
        pos[i*3+2]=cfg.depth[0]+Math.random()*(cfg.depth[1]-cfg.depth[0]);
        speeds[i]=cfg.speed*(0.5+Math.random());
    }
    geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
    const mat=new THREE.PointsMaterial({color:0x7ec8e3,size:cfg.size,transparent:true,opacity:cfg.opacity,depthWrite:false});
    const pts=new THREE.Points(geo,mat);
    scene.add(pts);
    starLayers.push({pts,geo,speeds,cfg});
});

// ── Mode 1 : Grille — 2 couches (proche + lointaine) ──
const gridLayers = [];
const GRID_CONFIGS = [
    {depth:-12, step:2,  span:40, opacity:0.09, color:0x7ec8e3, scrollSpeed:0.8},
    {depth:-35, step:4,  span:60, opacity:0.04, color:0x5a9ab5, scrollSpeed:0.3},
];
GRID_CONFIGS.forEach(cfg=>{
    const grp=new THREE.Group();
    const mat=new THREE.LineBasicMaterial({color:cfg.color,transparent:true,opacity:cfg.opacity,depthWrite:false});
    for(let x=-cfg.span;x<=cfg.span;x+=cfg.step){
        const g=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x,-cfg.span,cfg.depth),new THREE.Vector3(x,cfg.span,cfg.depth)]);
        grp.add(new THREE.Line(g,mat));
    }
    for(let y=-cfg.span;y<=cfg.span;y+=cfg.step){
        const g=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-cfg.span,y,cfg.depth),new THREE.Vector3(cfg.span,y,cfg.depth)]);
        grp.add(new THREE.Line(g,mat));
    }
    grp.visible=false;
    scene.add(grp);
    gridLayers.push({grp,cfg});
});

// ── Mode 2 : Nebula — 3 couches de brume ──
const nebulaLayers = [];
const NEB_CONFIGS = [
    {count:5,  depth:[-10,-20], scale:[10,18], opacity:0.10, speed:0.20, hueRange:[190,220]},
    {count:8,  depth:[-25,-40], scale:[12,22], opacity:0.06, speed:0.10, hueRange:[200,230]},
    {count:6,  depth:[-45,-65], scale:[15,28], opacity:0.03, speed:0.05, hueRange:[210,240]},
];
NEB_CONFIGS.forEach(cfg=>{
    const grp=new THREE.Group();
    const sprites=[];
    for(let i=0;i<cfg.count;i++){
        const nc=document.createElement('canvas'); nc.width=128; nc.height=128;
        const nctx=nc.getContext('2d');
        const hue=cfg.hueRange[0]+Math.random()*(cfg.hueRange[1]-cfg.hueRange[0]);
        const ng=nctx.createRadialGradient(64,64,0,64,64,64);
        ng.addColorStop(0,`hsla(${hue},60%,60%,${cfg.opacity})`);
        ng.addColorStop(0.4,`hsla(${hue},50%,40%,${cfg.opacity*0.5})`);
        ng.addColorStop(1,'rgba(0,0,0,0)');
        nctx.fillStyle=ng; nctx.fillRect(0,0,128,128);
        const nTex=new THREE.CanvasTexture(nc);
        const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:nTex,transparent:true,opacity:0.7,depthWrite:false}));
        const sc=cfg.scale[0]+Math.random()*(cfg.scale[1]-cfg.scale[0]);
        sp.scale.set(sc,sc,1);
        sp.position.set((Math.random()-0.5)*55,(Math.random()-0.5)*35,cfg.depth[0]+Math.random()*(cfg.depth[1]-cfg.depth[0]));
        sp.userData.vx=(Math.random()-0.5)*cfg.speed;
        sp.userData.vy=(Math.random()-0.5)*cfg.speed*0.5;
        sprites.push(sp);
        grp.add(sp);
    }
    grp.visible=false;
    scene.add(grp);
    nebulaLayers.push({grp,sprites,cfg});
});

// ── Mode 3 : Poussière cosmique — 3 couches ──
const dustLayers = [];
const DUST_CONFIGS = [
    {count:60,  depth:[-3,-15],  size:0.08, opacity:0.40, driftSpeed:0.08, spread:35},
    {count:100, depth:[-15,-35], size:0.05, opacity:0.25, driftSpeed:0.04, spread:45},
    {count:150, depth:[-35,-60], size:0.03, opacity:0.12, driftSpeed:0.02, spread:60},
];
DUST_CONFIGS.forEach(cfg=>{
    const geo=new THREE.BufferGeometry();
    const pos=new Float32Array(cfg.count*3);
    const vel=[];
    for(let i=0;i<cfg.count;i++){
        pos[i*3]=(Math.random()-0.5)*cfg.spread;
        pos[i*3+1]=(Math.random()-0.5)*cfg.spread*0.7;
        pos[i*3+2]=cfg.depth[0]+Math.random()*(cfg.depth[1]-cfg.depth[0]);
        vel.push({x:(Math.random()-0.5)*cfg.driftSpeed, y:(Math.random()-0.5)*cfg.driftSpeed*0.6, z:(Math.random()-0.5)*cfg.driftSpeed*0.3});
    }
    geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
    const mat=new THREE.PointsMaterial({color:0x7ec8e3,size:cfg.size,transparent:true,opacity:cfg.opacity,depthWrite:false});
    const pts=new THREE.Points(geo,mat);
    pts.visible=false;
    scene.add(pts);
    dustLayers.push({pts,geo,vel,cfg});
});

// ── Visibility ──
function updateBgVisibility(){
    starLayers.forEach(l=>l.pts.visible=(bgMode===0));
    gridLayers.forEach(l=>l.grp.visible=(bgMode===1));
    nebulaLayers.forEach(l=>l.grp.visible=(bgMode===2));
    dustLayers.forEach(l=>l.pts.visible=(bgMode===3));
}
updateBgVisibility();

// ── Tick ──
function tickBg(t, dt){
    // Étoiles multi-couches — chaque couche scroll à sa vitesse
    if(bgMode===0){
        starLayers.forEach(layer=>{
            const p=layer.geo.attributes.position.array;
            const n=layer.cfg.count;
            for(let i=0;i<n;i++){
                p[i*3+2]+=layer.speeds[i]*dt;
                if(p[i*3+2]>layer.cfg.depth[0]+5){
                    p[i*3+2]=layer.cfg.depth[1];
                    p[i*3]=(Math.random()-0.5)*layer.cfg.spread;
                    p[i*3+1]=(Math.random()-0.5)*layer.cfg.spread*0.7;
                }
            }
            layer.geo.attributes.position.needsUpdate=true;
        });
    }
    // Grille multi-couches — chaque couche scroll Y à sa vitesse
    if(bgMode===1){
        gridLayers.forEach(layer=>{
            layer.grp.position.y=-((t*layer.cfg.scrollSpeed)%layer.cfg.step);
        });
    }
    // Nebula multi-couches — drift lent par couche
    if(bgMode===2){
        nebulaLayers.forEach(layer=>{
            layer.sprites.forEach(s=>{
                s.position.x+=s.userData.vx*dt;
                s.position.y+=s.userData.vy*dt;
                if(s.position.x>30)s.position.x=-30;
                if(s.position.x<-30)s.position.x=30;
                if(s.position.y>20)s.position.y=-20;
                if(s.position.y<-20)s.position.y=20;
            });
        });
    }
    // Poussière multi-couches — drift organique
    if(bgMode===3){
        dustLayers.forEach(layer=>{
            const p=layer.geo.attributes.position.array;
            const hl=layer.cfg.spread/2;
            for(let i=0;i<layer.cfg.count;i++){
                p[i*3]+=layer.vel[i].x*dt;
                p[i*3+1]+=layer.vel[i].y*dt;
                p[i*3+2]+=layer.vel[i].z*dt;
                if(Math.abs(p[i*3])>hl)layer.vel[i].x*=-1;
                if(Math.abs(p[i*3+1])>hl*0.7)layer.vel[i].y*=-1;
                if(p[i*3+2]>layer.cfg.depth[0])layer.vel[i].z*=-1;
                if(p[i*3+2]<layer.cfg.depth[1])layer.vel[i].z*=-1;
            }
            layer.geo.attributes.position.needsUpdate=true;
        });
    }
}

// ── Bouton switcher ──
document.getElementById('btnBg').addEventListener('click',()=>{
    bgMode=(bgMode+1)%BG_MODES.length;
    updateBgVisibility();
    document.getElementById('btnBg').textContent='fond: '+BG_LABELS[bgMode];
});

// ═══ TRANSPARENCE DOMINOS ═══
let domAlpha = 1.0;
document.getElementById('sliderAlpha').addEventListener('input',(e)=>{
    domAlpha = parseInt(e.target.value)/100;
    document.getElementById('alphaVal').textContent=e.target.value+'%';
    sats.forEach(sat=>{
        const ud=sat.mesh.userData;
        if(ud.bgMesh) ud.bgMesh.material.opacity=domAlpha;
        if(ud.boxMesh){
            if(Array.isArray(ud.boxMesh.material)){
                ud.boxMesh.material.forEach(m=>{ m.opacity=m._baseOp*domAlpha; });
            } else { ud.boxMesh.material.opacity=ud.boxMesh.material._baseOp*domAlpha; }
        }
        if(ud.shadowMesh) ud.shadowMesh.material.opacity=0.6*domAlpha;
    });
});

// ═══ RENDER ═══

const clock=new THREE.Clock();
let lastTime=0;
let flipProgress=0;
let flipMidSwapped=false;
function animate(){
    requestAnimationFrame(animate);const t=clock.getElapsedTime();const dt=t-lastTime;lastTime=t;
    if(isAnimating){
        if(flipDir!==0){
            flipProgress=Math.min(1, flipProgress+dt*1.8);
            const ease=flipProgress<0.5?2*flipProgress*flipProgress:(1-Math.pow(-2*flipProgress+2,2)/2);
            const angle=ease*Math.PI*flipDir;
            cubeGroup.quaternion.setFromAxisAngle(new THREE.Vector3(1,0,0), angle);
            // À 90° (invisible) : swap texture porte pour que l'arrivée à 180° = visuellement identique
            if(!flipMidSwapped && ease>=0.5){
                flipMidSwapped=true;
                updatePorte([porteValue[1],porteValue[0]]);
            }
            if(flipProgress>=1){
                cubeGroup.quaternion.identity();targetQuat.identity();
                flipProgress=0;flipMidSwapped=false;onRotationComplete();
            }
        } else {
            cubeGroup.quaternion.slerp(targetQuat,0.12);
            if(1-Math.abs(cubeGroup.quaternion.dot(targetQuat))<0.0001){cubeGroup.quaternion.copy(targetQuat);onRotationComplete();}
        }
    }
    tickSwapAnim(dt);
    tickBg(t, dt);
    // Halo ice pulse
    const hp=0.5+0.5*Math.sin(t*1.8);
    haloSpriteMat.opacity=0.4+hp*0.35;
    camera.position.x+=(targetCamX-camera.position.x)*0.08;
    camera.position.z+=(targetCamZ-camera.position.z)*0.08;
    camera.lookAt(camera.position.x, 0, 0);
    const fIdx=mod(currentIdx);
    // Trouver le satellite sous le flottant (le plus proche sur le tableau courant)
    let hoveredSat=null;
    if(lockedSat){
        const wp=new THREE.Vector3();lockedSat.mesh.getWorldPosition(wp);
        const lp=cubeGroup.worldToLocal(wp.clone());
        let bestD=GAP*0.9, bestS=null;
        sats.forEach(s=>{
            if(s===lockedSat||s.locked||s.tableau!==fIdx)return;
            const d=Math.hypot(s.lx-lp.x,s.ly-lp.y);
            if(d<bestD){bestD=d;bestS=s;}
        });
        hoveredSat=bestS;
    }
    sats.forEach((sat,si)=>{const ud=sat.mesh.userData;
        // ── Micro-tilt respiration (chaque domino a un offset unique) ──
        if(sat.mesh.visible && !sat.locked && !isAnimating && !swapAnim && sat.baseQuat){
            const phase = t*1.2 + si*1.7;
            const tiltX = Math.sin(phase) * 0.012;
            const tiltY = Math.cos(phase*0.7) * 0.008;
            const breathQ = new THREE.Quaternion().setFromEuler(new THREE.Euler(tiltX, 0, tiltY));
            sat.mesh.quaternion.copy(sat.baseQuat).multiply(breathQ);
        }
        if(sat.locked){sat.mesh.visible=true;const p=0.5+0.5*Math.sin(t*3.5);
            ud.glowMesh.material.opacity=0.2+p*0.35;ud.haloMesh.material.opacity=0.05+p*0.1;
            ud.numMesh.material.map=getDominoTex(sat.value[0],sat.value[1],'cyan');
            ud.edgeLines.material.color.set(0x5eefff);ud.edgeLines.material.opacity=0.35;
        } else {
            // Masquer si position source OU si sous le flottant
            if(isHiddenBySrc(sat)||sat===hoveredSat){sat.mesh.visible=false;}
            else if(!isAnimating){sat.mesh.visible=(sat.tableau===fIdx);}
            ud.glowMesh.material.opacity=0;ud.haloMesh.material.opacity=0;
            const st=sat.state||'white';
            let tint=(st!=='white'?st:'normal');
            ud.numMesh.material.map=getDominoTex(sat.value[0],sat.value[1],tint);
            // Edge + glow selon state
            if(st==='cosmic'){
                // Cosmic : bordure cycle violet→cyan→rose, halo pulsant violet
                const cPhase=t*1.5+si;
                const cr=Math.sin(cPhase)*0.5+0.5, cg=Math.sin(cPhase+2.1)*0.5+0.5, cb=Math.sin(cPhase+4.2)*0.5+0.5;
                ud.edgeLines.material.color.setRGB(0.5+cr*0.5, cg*0.5, 0.5+cb*0.5);
                ud.edgeLines.material.opacity=0.35+Math.sin(t*2)*0.1;
                const cp=0.3+0.2*Math.sin(t*2+si);
                ud.glowMesh.material.color.set(0x8338ec);ud.glowMesh.material.opacity=cp;
                ud.haloMesh.material.color.set(0x8338ec);ud.haloMesh.material.opacity=cp*0.4;
            } else if(st==='supernovae'){
                // Supernovae : bordure cycle orange→doré→jaune, halo pulsant intense
                const sPhase=t*2+si;
                const sr=1, sg=0.4+Math.sin(sPhase)*0.35, sb=Math.sin(sPhase*0.7)*0.15;
                ud.edgeLines.material.color.setRGB(sr, sg, sb);
                ud.edgeLines.material.opacity=0.4+Math.sin(t*2.5)*0.15;
                const sp=0.4+0.25*Math.sin(t*2.5+si);
                ud.glowMesh.material.color.set(0xff8c00);ud.glowMesh.material.opacity=sp;
                ud.haloMesh.material.color.set(0xffd700);ud.haloMesh.material.opacity=sp*0.5;
            } else {
                const eCol = st==='silver'?0x22d3ee : st==='gold'?0xffd700 : st==='emerald'?0x34d399 : 0x7ec8e3;
                ud.edgeLines.material.color.set(eCol);
                ud.edgeLines.material.opacity=0.18;
            }
        }
    });
    renderer.render(scene,camera);
}
assignFaces();updateUI();animate();
</script>
